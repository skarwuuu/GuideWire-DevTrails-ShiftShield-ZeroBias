services:
  - type: web
    name: shiftshield-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: MODEL_PATH
        value: app/engine/scoring_model.joblib
      - key: PYTHON_VERSION
        value: "3.10.13"
